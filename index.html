<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Headline — MICCAI challenge on head CT radiology report generation. Coming soon." />
    <meta name="robots" content="noindex" />

    <title>Headline — MICCAI Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:           #080d13;
        --surface:      #101820;
        --border:       rgba(255,255,255,0.07);
        --text:         #dde4ed;
        --muted:        #94a8bc;
        --accent:       #3b9eff;
        --accent-glow:  rgba(59, 158, 255, 0.18);

        --font-display: 'DM Serif Display', Georgia, serif;
        --font-body:    'DM Sans', sans-serif;
        --font-mono:    'DM Mono', monospace;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: var(--font-body);
        font-size: clamp(0.95rem, 2.2vw, 1.05rem);
        line-height: 1.65;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(2rem, 8vw, 4rem) clamp(1.25rem, 5vw, 2.5rem);
        text-align: center;
      }

      .logo {
        width: clamp(120px, 20vw, 180px);
        margin-bottom: 2.5rem;
      }

      h1 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 400;
        letter-spacing: -0.01em;
        margin-bottom: 1rem;
      }

      .subtitle {
        color: var(--muted);
        max-width: 36rem;
        margin-bottom: 2rem;
      }

      .badge {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-glow);
        border: 1px solid rgba(59, 158, 255, 0.25);
        border-radius: 100px;
        padding: 0.35em 1em;
        margin-bottom: 2.5rem;
      }

      .divider {
        width: 3rem;
        height: 1px;
        background: var(--border);
        margin: 0 auto 2rem;
      }

      .footer-note {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .footer-note a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer-note a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <img src="logo-transparent.png" alt="Headline MICCAI Challenge logo" class="logo" />

    <div class="badge">Coming Soon</div>

    <h1>Headline Challenge — MICCAI 2026</h1>

    <p class="subtitle">
      A benchmark challenge on automated radiology report generation from 3D head CT scans.
      The site is under construction — check back soon.
    </p>

    <div class="divider"></div>

    <p class="footer-note">
      Questions? Contact us at
      <a href="mailto:headline@ccibonn.ai">headline@ccibonn.ai</a>
    </p>
  </body>
</html>
